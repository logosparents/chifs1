  <style>
    /* 螢幕預覽與基本樣式 */
    .print-page {
      background: white;
      margin-top: 1rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
      width: 210mm;
      height: 297mm;
      box-sizing: border-box;
      padding: 16mm 20mm;
      position: relative;
    }

    /* 模擬手寫田字格樣式 */
    .grid-cell {
      width: 2.2rem;
      height: 2.2rem;
      border: 1px solid #94a3b8;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .grid-cell::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      border-top: 1px dashed #cbd5e1;
    }
    .grid-cell::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      width: 1px;
      height: 100%;
      border-left: 1px dashed #cbd5e1;
    }

    /* 當開啟答案模式時，隱藏學生輸入，顯示答案字樣 */
    body.show-answers-active .student-input-wrap {
      display: none !important;
    }
    body.show-answers-active .answer-text {
      display: inline-block !important;
    }

    /* 當關閉答案模式時，顯示學生輸入，隱藏答案字樣 */
    body:not(.show-answers-active) .student-input-wrap {
      display: inline-block !important;
    }
    body:not(.show-answers-active) .answer-text {
      display: none !important;
    }

    /* 確保輸入框在螢幕中排版美觀 */
    input[type="text"] {
      border-bottom: 1px dashed #94a3b8;
      outline: none;
    }

    /* ========================================================== */
    /* 核心列印優化 (Margin 修正與 A4 完美 8 頁定位) */
    /* ========================================================== */
    @page {
      size: A4;
      margin: 0 !important; /* 強制移除瀏覽器預設頁邊距，杜絕跑版 */
    }

    @media print {
      body {
        background-color: white !important;
        color: black !important;
        margin: 0 !important;
        padding: 0 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .no-print {
        display: none !important;
      }

      /* 嚴格的 A4 物理盒模型，消除上下溢出，確保完美 8 頁 */
      .print-page {
        width: 210mm !important;
        height: 297mm !important;
        min-height: 297mm !important;
        max-height: 297mm !important;
        margin: 0 !important;
        padding: 15mm 20mm !important; /* 內部安全邊距 */
        box-shadow: none !important;
        border-radius: 0 !important;
        page-break-after: always !important;
        break-after: page !important;
        position: relative !important;
        box-sizing: border-box !important;
        background: white !important;
        overflow: hidden !important; /* 防止極端情況下的文字溢出引發多餘白頁 */
      }

      /* 頁尾頁碼固定於每張 A4 底部 */
      .print-page-footer {
        position: absolute !important;
        bottom: 10mm !important;
        left: 0 !important;
        right: 0 !important;
        text-align: center !important;
      }
    }
  </style>

                      <strong>古詩問答：</strong> 1. <strong class="text-red-600">${data.p3.q1.ans}</strong> | 2. <strong class="text-red-600">${data.p3.q2.ans}</strong> | 3. <strong class="text-red-600">${data.p4.q3.ans}</strong> <br />
                      4. <strong class="text-red-600">${data.p4.q4.text冠}</strong> 雞冠，<strong class="text-red-600">${data.p4.q4.text羽}</strong> 羽毛，一叫千門 <strong class="text-red-600">${data.p4.q4.text戶}</strong> 戶開。<br />
                      <strong>五. 量詞：</strong> ${data.p4.quantifiers.map((item, idx) => `${idx+1}. <strong class="text-red-600">${item.ans}</strong>`).join(' | ')}
                    </p>
                  </div>

                  <div>
                    <h4 class="font-bold text-slate-800 bg-slate-200 px-2 py-0.5 rounded mb-1">
                      六. 擬人 (8%) 與 七. 擬聲詞 (10%)
                    </h4>
                    <p class="leading-relaxed pl-1 text-slate-700 font-serif">
                      <strong>六. 擬人：</strong> ${data.p4.personify.map((item, idx) => `${idx+1}. <strong class="text-red-600">${item.ans}</strong>`).join(' | ')}<br />
                      <strong>七. 擬聲：</strong> ${data.p5.onomFill.map((item, idx) => `${idx+1}. <strong class="text-red-600">${item.ans}</strong>`).join(' | ')}
                    </p>
                  </div>
                </div>

                <!-- 欄 2 -->
                <div class="space-y-3">
                  <div>
                    <h4 class="font-bold text-slate-800 bg-slate-200 px-2 py-0.5 rounded mb-1 font-sans">
                      八. 重組 (6%) 與 九. 改寫 (4%) 與 十. 仿作 (4%)
                    </h4>
                    <p class="leading-relaxed pl-1 text-slate-700 font-serif text-[10px]">
                      <strong>重組：</strong><br />
                      1. ${data.p5.reorder[0].ans}<br />
                      2. ${data.p5.reorder[1].ans}<br />
                      <strong>改寫：</strong><br />
                      1. ${data.p5.rewrite[0].ans}<br />
                      2. ${data.p5.rewrite[1].ans}<br />
                      <strong>四素句仿作：</strong><br />
                      例：${data.p5.fourElements.ans}
                    </p>
                  </div>

                  <div>
                    <h4 class="font-bold text-slate-800 bg-slate-200 px-2 py-0.5 rounded mb-1 font-sans">
                      十一. 閱讀理解：邀請卡 (5%)
                    </h4>
                    <p class="leading-relaxed pl-1 text-slate-700 font-serif">
                      1. 這張邀請卡是${data.p6.sender}寫給 <strong class="text-red-600 font-sans">${data.p6.target}</strong> 的。 (2分)<br />
                      2. 關係：<strong class="text-red-600 font-sans">${data.p6.relationAns}. 朋友</strong> (1分)<br />
                      3. 主要目的：<strong class="text-red-600 font-sans">${data.p6.purposeAns}. 邀請朋友參加活動</strong> (2分)
                    </p>
                  </div>

                  <div>
                    <h4 class="font-bold text-slate-800 bg-slate-200 px-2 py-0.5 rounded mb-1 font-sans">
                      十二. 閱讀理解：${data.p7.artTitle} (15%)
                    </h4>
                    <p class="leading-relaxed pl-1 text-slate-700 font-serif text-[10px]">
                      1. 詞語：<strong class="text-red-600 font-sans">${data.p7.vocab1}</strong> (2分)<br />
                      2. 詞語：<strong class="text-red-600 font-sans">${data.p7.vocab2}</strong> (2分)<br />
                      3. 填空：時間(<strong class="text-red-600 font-sans">${data.p7.fourElements.time}</strong>) | 人物(<strong class="text-red-600 font-sans">${data.p7.fourElements.character}</strong>) | 地點(<strong class="text-red-600 font-sans">${data.p7.fourElements.place}</strong>) | 事情(<strong class="text-red-600 font-sans">${data.p7.fourElements.event}</strong>) (共4分)<br />
                      4. 為甚麼嚇壞：<strong class="text-red-600 font-sans">${data.p7.q4Ans}</strong> (2分)<br />
                      5. 熱心幫助主角：<strong class="text-red-600 font-sans">${data.p7.q5Ans}</strong> (2分)<br />
                      6. 先後排序：<strong class="text-red-600 font-sans">${data.p7.sortAns}</strong> (3分，全對才給分)
                    </p>
                  </div>
                </div>

              </div>

              <!-- 底部說明 -->
              <div class="mt-6 p-3 bg-red-50 border border-red-200 rounded text-[10px] text-red-700 leading-relaxed font-sans">
                <strong>特別扣分標準 (FS1 統一標準)：</strong><br />
                1. 全卷所有手寫中文字，凡出現錯字、別字、多字，每個扣 0.5 分，單題最高扣至該題分數的一半。<br>
                2. 標點符號漏寫或位置錯誤，每個扣 0.5 分。重組句子必須全對才給滿分。
              </div>
            </div>

            <div class="print-page-footer text-center text-xs text-slate-400 font-medium pt-4">
              FS1-CHINESE-EXAM-KEY (第 8 頁)
            </div>
          </div>
        </section>
      `;

      container.innerHTML = htmlContent;

      // 重新建立多選題圓圈黑化監聽與標準高亮
      setupMultipleChoices();
      resetToStandardChoices();
      lucide.createIcons();
    }

    // 試卷切換
    function switchExamSet(val) {
      renderExamSet(val);
    }

    // 初始化默認第一套
    document.addEventListener("DOMContentLoaded", () => {
      renderExamSet(0);
    });

    // 切換參考答案模式
    function toggleAnswers() {
      const body = document.body;
      const btn = document.getElementById("toggle-answers-btn");
      const icon = document.getElementById("toggle-icon");
      const text = document.getElementById("toggle-text");

      showAnswers = !showAnswers;

      if (showAnswers) {
        body.classList.add("show-answers-active");
        btn.className = "flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all bg-emerald-100 text-emerald-800 hover:bg-emerald-200";
        icon.setAttribute("data-lucide", "eye");
        text.innerText = "隱藏參考答案 (學生模式)";
        resetToStandardChoices();
      } else {
        body.classList.remove("show-answers-active");
        btn.className = "flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all bg-slate-200 text-slate-700 hover:bg-slate-300";
        icon.setAttribute("data-lucide", "eye-off");
        text.innerText = "顯示參考答案 (教師模式)";
        clearSelectionHighlights();
      }
      lucide.createIcons();
    }

    // 重設學生的輸入與清除欄位
    function clearAnswers() {
      if (confirm("確定要清除所有手寫作答嗎？")) {
        const inputs = document.querySelectorAll("input[type='text'], textarea");
        inputs.forEach(input => input.value = "");

        const radios = document.querySelectorAll("input[type='radio']");
        radios.forEach(radio => radio.checked = false);

        if (!showAnswers) {
          clearSelectionHighlights();
        }
      }
    }

    // 設定模擬塗黑圓圈的單選題互動功能
    function setupMultipleChoices() {
      setupChoiceGroup("p3-q1", "q-circle-p3-1");
      setupChoiceGroup("p3-q2", "q-circle-p3-2");
      setupChoiceGroup("p4-q3", "q-circle-p4-3");
      setupChoiceGroup("p6-q2", "q-circle-p6-2");
      setupChoiceGroup("p6-q3", "q-circle-p6-3");
      setupChoiceGroup("p7-q4", "q-circle-p7-4");
      setupChoiceGroup("p7-q5", "q-circle-p7-5");
    }

    function setupChoiceGroup(groupId, circleClass) {
      const group = document.getElementById(groupId);
      if (!group) return;

      const labels = group.querySelectorAll("label");
      labels.forEach(label => {
        label.addEventListener("click", (e) => {
          if (showAnswers) return;

          const circles = group.querySelectorAll("." + circleClass);
          circles.forEach(c => {
            c.className = `${circleClass} w-5 h-5 rounded-full border border-slate-400 flex items-center justify-center text-xs font-bold bg-white`;
          });

          const circle = label.querySelector("." + circleClass);
          if (circle) {
            circle.className = `${circleClass} w-5 h-5 rounded-full border border-slate-800 flex items-center justify-center text-xs font-bold bg-slate-800 text-white`;
          }
        });
      });
    }

    function clearSelectionHighlights() {
      const allCircles = document.querySelectorAll(".q-circle");
      allCircles.forEach(c => {
        c.className = "q-circle w-5 h-5 rounded-full border border-slate-400 flex items-center justify-center text-xs font-bold bg-white font-sans";
      });
    }

    function resetToStandardChoices() {
      clearSelectionHighlights();
      const data = examSets[currentSetIndex];
      
      setChoiceActive("p3-q1", "q-circle-p3-1", data.p3.q1.ans);
      setChoiceActive("p3-q2", "q-circle-p3-2", data.p3.q2.ans);
      setChoiceActive("p4-q3", "q-circle-p4-3", data.p4.q3.ans);
      setChoiceActive("p6-q2", "q-circle-p6-2", data.p6.relationAns);
      setChoiceActive("p6-q3", "q-circle-p6-3", data.p6.purposeAns);
      setChoiceActive("p7-q4", "q-circle-p7-4", data.p7.q4Ans);
      setChoiceActive("p7-q5", "q-circle-p7-5", data.p7.q5Ans);
    }

    function setChoiceActive(groupId, circleClass, choiceKey) {
      const target = document.querySelector(`#${groupId} [data-choice='${choiceKey}']`);
      if (target) {
        target.className = `${circleClass} q-circle w-5 h-5 rounded-full border border-slate-800 flex items-center justify-center text-xs font-bold bg-slate-800 text-white`;
      }
    }
  </script>
</body>
</html>
