<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小一中文試卷智能生成器</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for professional Chinese typography -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&family=Noto+Serif+TC:wght=400;600;900&display=swap" rel="stylesheet">
    <!-- React and Babel CDN for single-file interactive app -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                        serif: ['Noto Serif TC', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Print Styles */
        @media print {
            body {
                background-color: white !important;
                color: black !important;
            }
            .no-print {
                display: none !important;
            }
            .print-area {
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
            }
            .page-break {
                page-break-before: always;
                break-before: page;
            }
            .exam-page {
                border: none !important;
                margin-bottom: 0 !important;
                padding: 1.5cm !important;
                min-height: 29.7cm;
                height: auto;
            }
        }
        
        /* Custom P1 styling */
        .p1-pinyin {
            font-size: 0.75rem;
            color: #6b7280;
        }
        .chinese-char {
            font-family: 'Noto Serif TC', serif;
        }
        .write-box {
            border: 1px dashed #9ca3af;
            display: inline-block;
            width: 2.2rem;
            height: 2.2rem;
            text-align: center;
            line-height: 2.1rem;
            vertical-align: middle;
            border-radius: 4px;
        }
        .tian-zi-ge {
            position: relative;
            width: 3rem;
            height: 3rem;
            border: 2px solid #22c55e;
            display: inline-block;
        }
        .tian-zi-ge::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            border-top: 1px dashed #86efac;
        }
        .tian-zi-ge::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            height: 100%;
            border-left: 1px dashed #86efac;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <div id="root"></div>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Data Pools for Randomization
        const punctuationPool = [
            {
                id: 1,
                sentences: [
                    { text: "新年時", spaceBefore: false, answer: "，", showAnswer: "，" },
                    { text: "大家都喜歡穿着黃色", spaceBefore: false, answer: "、", showAnswer: "、" },
                    { text: "紅色", spaceBefore: false, answer: "、", showAnswer: "、" },
                    { text: "粉紅色和紫色的衣服", spaceBefore: false, answer: "。", showAnswer: "。" },
                    { text: "\n家明問我", spaceBefore: false, answer: "：", showAnswer: "：" },
                    { text: "", spaceBefore: true, answer: "「", showAnswer: "「" },
                    { text: "請問這輛巴士是往哪裏去的", spaceBefore: false, answer: "？", showAnswer: "？" },
                    { text: "", spaceBefore: true, answer: "」", showAnswer: "」" },
                    { text: "\n這次比賽很好玩", spaceBefore: false, answer: "，", showAnswer: "，" },
                    { text: "我們還得到比賽冠軍啊", spaceBefore: false, answer: "！", showAnswer: "！" }
                ]
            },
            {
                id: 2,
                sentences: [
                    { text: "星期天", spaceBefore: false, answer: "，", showAnswer: "，" },
                    { text: "爸爸帶我到郊外放風箏", spaceBefore: false, answer: "。" },
                    { text: "\n妹妹高興地喊道", spaceBefore: false, answer: "：", showAnswer: "：" },
                    { text: "", spaceBefore: true, answer: "「", showAnswer: "「" },
                    { text: "這裏的花兒真美麗啊", spaceBefore: false, answer: "！", showAnswer: "！" },
                    { text: "", spaceBefore: true, answer: "」", showAnswer: "」" },
                    { text: "\n花園裏開滿了黃色", spaceBefore: false, answer: "、", showAnswer: "、" },
                    { text: "粉紅色", spaceBefore: false, answer: "、", showAnswer: "、" },
                    { text: "大紅色和紫色的鬱金香", spaceBefore: false, answer: "。", showAnswer: "。" },
                    { text: "\n你看見那隻漂亮的蝴蝶了嗎", spaceBefore: false, answer: "？", showAnswer: "？" }
                ]
            }
        ];

        const wordFillPool = [
            { word: "窗戶", sentence: "老師打開（窗戶），保持室內空氣流通。", lesson: "第17課" },
            { word: "桌子", sentence: "小明把課本和筆盒整齊地放在（桌子）上。", lesson: "第18課" },
            { word: "乾淨", sentence: "我們要把雙手洗得（乾淨），才去吃晚飯。", lesson: "第12課" },
            { word: "膽小", sentence: "妹妹十分（膽小），一聽到雷聲就嚇得哭起來。", lesson: "第14課" },
            { word: "緊緊", sentence: "媽媽（緊緊）地牽着我的手，帶我過馬路。", lesson: "第22課" },
            { word: "為甚麼", sentence: "你（為甚麼）今天上學遲到了呢？", lesson: "第20課" },
            { word: "收拾", sentence: "放學前，同學們都主動（收拾）好自己的書包。", lesson: "第17課" },
            { word: "決定", sentence: "經過全班同學投票，我們（決定）去西貢郊遊。", lesson: "第29課" },
            { word: "美麗", sentence: "展覽館掛滿了（美麗）的油畫，吸引很多遊人觀賞。", lesson: "第25課" },
            { word: "幸福", sentence: "穿上媽媽親手編織的毛衣，我感到自己是全世界最（幸福）的人。", lesson: "第29課" },
            { word: "喜歡", sentence: "放學後，我最（喜歡）和弟弟一起打乒乓球。", lesson: "第25課" }
        ];

        const freeFillPool = [
            { word: "圖畫", sentence: "美術課上，我們用彩色的蠟筆畫了一幅美麗的（圖畫）。", lesson: "第25課" },
            { word: "漂亮", sentence: "姐姐今天穿了一條十分（漂亮）的新裙子。", lesson: "第23課" },
            { word: "感謝", sentence: "我買了一份禮物送給家傭姐姐，（感謝）她對我的悉心照顧。", lesson: "第29課" },
            { word: "知道", sentence: "爸爸（知道）弟弟最喜歡砌模型，所以買了模型飛機作為他的生日禮物。", lesson: "第29課" },
            { word: "要求", sentence: "老師（要求）我們上課時要專心聽講，不可喧嘩。", lesson: "第15課" },
            { word: "馬路", sentence: "過（馬路）時，我們必須看清紅綠燈，注意安全。", lesson: "第19課" },
            { word: "放開", sentence: "小明不小心（放開）了拿着氫氣球的手，氣球便飛上天空去了。", lesson: "第22課" },
            { word: "整潔", sentence: "每天放學後，校工都會打掃課室，保持環境（整潔）。", lesson: "第17課" }
        ];

        const classifierPool = [
            {
                q: "我把一（　　）小樹苗種在泥土裏。",
                options: ["A. 顆", "B. 棵", "C. 個"],
                ans: "B"
            },
            {
                q: "可愛的小兔子有一（　　）長長的耳朵。",
                options: ["A. 隻", "B. 條", "C. 對"],
                ans: "C"
            },
            {
                q: "魚缸裏游着一（　　）魚兒，它的顏色很鮮豔。",
                options: ["A. 尾", "B. 朵", "C. 本"],
                ans: "A"
            },
            {
                q: "叔叔的手腕上戴着一（　　）精美的手錶。",
                options: ["A. 隻", "B. 塊", "C. 個"],
                ans: "A"
            },
            {
                q: "草地上開滿了一（　　）朵美麗的小紅花。",
                options: ["A. 朵", "B. 棵", "C. 條"],
                ans: "A"
            }
        ];

        const personificationPool = [
            { s: "星星眨着眼睛，靜靜地守護着月亮姐姐。", isP: true },
            { s: "清澈的湖水倒映藍天，翠綠的小草佈滿岸邊。", isP: false },
            { s: "可愛的小鳥停在粗壯的樹枝上梳理羽毛。", isP: false },
            { s: "月亮姐姐躲在雲兒後面，探頭偷看人們。", isP: true },
            { s: "花兒在風中跳起優美的舞蹈，迎接春天的到來。", isP: true },
            { s: "小溪一路唱着歡快的歌兒流向大海。", isP: true },
            { s: "高大的樟樹像一排排士兵守衛在校門兩側。", isP: false } // 比喻，非擬人
        ];

        const onomatopoeiaPool = [
            { word: "汪汪", sentence: "小狗不停地（汪汪）叫，搖着尾巴向我跑過來。" },
            { word: "叮噹", sentence: "預備上課的鈴聲（叮噹）響起，我們立刻走回課室。" },
            { word: "吱吱", sentence: "天剛亮，小鳥就在籠子裏（吱吱）亂叫。" },
            { word: "呱呱", sentence: "池塘裏的小青蛙（呱呱）地叫個不停。" },
            { word: "嘩啦", sentence: "我站在河邊，聽着（嘩啦）的流水聲，感到身心舒暢。" },
            { word: "沙沙", sentence: "秋風吹過森林，樹葉發出（沙沙）的聲響。" }
        ];

        const reorderSentencePool = [
            {
                id: 1,
                parts: ["尖尖的", "哥哥", "放進", "筆盒裏", "把", "鉛筆", "小心地", "。"],
                ans: "哥哥把尖尖的鉛筆小心地放進筆盒裏。"
            },
            {
                id: 2,
                parts: ["公園", "單車", "媽媽", "星期六", "帶我", "踏", "去", "。", "，"],
                ans: "星期六，媽媽帶我去公園踏單車。"
            },
            {
                id: 3,
                parts: ["妹妹", "美麗的", "洋娃娃", "在床上", "抱着", "睡覺", "甜甜地", "。"],
                ans: "妹妹在床上抱着美麗的洋娃娃甜甜地睡覺。"
            }
        ];

        const rewriteSentencePool = [
            {
                orig: "樹葉會在秋天落下來。",
                key: "為甚麼",
                ans: "為甚麼樹葉會在秋天落下來？ / 樹葉為甚麼會在秋天落下來？"
            },
            {
                orig: "爸爸去便利店買冰淇淋。",
                key: "為甚麼",
                ans: "為甚麼爸爸去便利店買冰淇淋？ / 爸爸為甚麼去便利店買冰淇淋？"
            },
            {
                orig: "貓咪喜歡在白天睡覺。",
                key: "為甚麼",
                ans: "為甚麼貓咪喜歡在白天睡覺？"
            }
        ];

        function App() {
            // Document State
            const [schoolName, setSchoolName] = useState("太陽島小學");
            const [examTitle, setExamTitle] = useState("第二次總結性評估前練習");
            const [fontSize, setFontSize] = useState("text-xl"); // text-lg, text-xl, text-2xl
            const [showAnswers, setShowAnswers] = useState(false);
            const [themeColor, setThemeColor] = useState("emerald"); // emerald, blue, indigo

            // Randomized Content State
            const [puncEx, setPuncEx] = useState(punctuationPool[0]);
            const [wordFillEx, setWordFillEx] = useState([]);
            const [wordFillBank, setWordFillBank] = useState([]);
            const [freeFillEx, setFreeFillEx] = useState([]);
            const [classifierEx, setClassifierEx] = useState([]);
            const [personificationEx, setPersonificationEx] = useState([]);
            const [onomatopoeiaEx, setOnomatopoeiaEx] = useState([]);
            const [onomatopoeiaBank, setOnomatopoeiaBank] = useState([]);
            const [reorderEx, setReorderEx] = useState([]);
            const [rewriteEx, setRewriteEx] = useState([]);

            // Helper to shuffle arrays
            const shuffleArray = (array) => {
                const arr = [...array];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            };

            // Main function to generate dynamic paper
            const generateNewPaper = () => {
                // 1. Punctuation
                const randomPunc = punctuationPool[Math.floor(Math.random() * punctuationPool.length)];
                setPuncEx(randomPunc);

                // 2. Word Fill-in (Choose 5 words randomly)
                const shuffledWordPool = shuffleArray(wordFillPool);
                const chosenWordFill = shuffledWordPool.slice(0, 5);
                setWordFillEx(chosenWordFill);
                setWordFillBank(shuffleArray(chosenWordFill.map(item => item.word)));

                // 3. Free Fill-in (Choose 5 words randomly)
                const shuffledFreePool = shuffleArray(freeFillPool);
                setFreeFillEx(shuffledFreePool.slice(0, 5));

                // 5. Classifiers (Choose 3)
                const shuffledClass = shuffleArray(classifierPool);
                setClassifierEx(shuffledClass.slice(0, 3));

                // 6. Personification (Choose 4)
                const shuffledPers = shuffleArray(personificationPool);
                setPersonificationEx(shuffledPers.slice(0, 4));

                // 7. Onomatopoeia (Choose 5)
                const shuffledOno = shuffleArray(onomatopoeiaPool);
                const chosenOno = shuffledOno.slice(0, 5);
                setOnomatopoeiaEx(chosenOno);
                setOnomatopoeiaBank(shuffleArray(chosenOno.map(item => item.word)));

                // 8. Reorder Sentences (Choose 2)
                const shuffledReorder = shuffleArray(reorderSentencePool);
                setReorderEx(shuffledReorder.slice(0, 2));

                // 9. Rewrite Sentences (Choose 2)
                const shuffledRewrite = shuffleArray(rewriteSentencePool);
                setRewriteEx(shuffledRewrite.slice(0, 2));
            };

            // Initialize on mount
            useEffect(() => {
                generateNewPaper();
            }, []);

            // Theme CSS helper
            const getThemeClasses = () => {
                const base = {
                    emerald: {
                        primary: "bg-emerald-600 hover:bg-emerald-700 text-white",
                        border: "border-emerald-600",
                        text: "text-emerald-700",
                        lightBg: "bg-emerald-50",
                        accentBorder: "border-emerald-200",
                    },
                    blue: {
                        primary: "bg-blue-600 hover:bg-blue-700 text-white",
                        border: "border-blue-600",
                        text: "text-blue-700",
                        lightBg: "bg-blue-50",
                        accentBorder: "border-blue-200",
                    },
                    indigo: {
                        primary: "bg-indigo-600 hover:bg-indigo-700 text-white",
                        border: "border-indigo-600",
                        text: "text-indigo-700",
                        lightBg: "bg-indigo-50",
                        accentBorder: "border-indigo-200",
                    },
                };
                return base[themeColor] || base.emerald;
            };

            const t = getThemeClasses();

            return (
                <div className="flex flex-col lg:flex-row min-h-screen">
                    
                    {/* 🔧 Control Panel - Hidden during Printing */}
                    <div className="w-full lg:w-[380px] bg-white p-6 border-b lg:border-r border-slate-200 shadow-sm no-print flex flex-col justify-between sticky top-0 z-30 lg:h-screen lg:overflow-y-auto">
                        <div>
                            <div className="flex items-center gap-3 mb-6">
                                <span className="text-3xl">📄</span>
                                <div>
                                    <h1 className="font-black text-lg text-slate-800 tracking-tight">小一中文試卷生成器</h1>
                                    <p className="text-xs text-slate-500 font-medium">系統工程師專用後台 v1.2</p>
                                </div>
                            </div>

                            <hr className="mb-6 border-slate-100" />

                            {/* Settings Sections */}
                            <div className="space-y-5">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">學校名稱</label>
                                    <input 
                                        type="text" 
                                        value={schoolName} 
                                        onChange={(e) => setSchoolName(e.target.value)}
                                        className="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">評估名稱</label>
                                    <input 
                                        type="text" 
                                        value={examTitle} 
                                        onChange={(e) => setExamTitle(e.target.value)}
                                        className="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">風格色調</label>
                                    <div className="flex gap-2">
                                        {['emerald', 'blue', 'indigo'].map((color) => (
                                            <button
                                                key={color}
                                                onClick={() => setThemeColor(color)}
                                                className={`flex-1 py-1.5 rounded-lg text-xs font-semibold capitalize border ${themeColor === color ? 'bg-slate-900 text-white border-slate-900' : 'bg-slate-50 border-slate-200 text-slate-600'}`}
                                            >
                                                {color === 'emerald' ? '清新綠' : color === 'blue' ? '天空藍' : '優雅靛'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">字體大小限制 (小一標準)</label>
                                    <div className="flex gap-2">
                                        {[
                                            { label: '標準 (16px)', val: 'text-lg' },
                                            { label: '大字 (20px)', val: 'text-xl' },
                                            { label: '特大 (24px)', val: 'text-2xl' }
                                        ].map((sz) => (
                                            <button
                                                key={sz.val}
                                                onClick={() => setFontSize(sz.val)}
                                                className={`flex-1 py-1.5 rounded-lg text-xs font-semibold border ${fontSize === sz.val ? 'bg-slate-900 text-white border-slate-900' : 'bg-slate-50 border-slate-200 text-slate-600'}`}
                                            >
                                                {sz.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="pt-2">
                                    <label className="relative inline-flex items-center cursor-pointer">
                                        <input 
                                            type="checkbox" 
                                            checked={showAnswers} 
                                            onChange={(e) => setShowAnswers(e.target.checked)} 
                                            className="sr-only peer"
                                        />
                                        <div className="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-600"></div>
                                        <span className="ml-3 text-sm font-bold text-slate-700">顯示參考答案</span>
                                    </label>
                                    <p className="text-[11px] text-slate-400 mt-1">開啟後，學生寫作處會以紅字即時顯示參考正確答案。</p>
                                </div>
                            </div>
                        </div>

                        <div className="mt-8 space-y-3">
                            <button 
                                onClick={generateNewPaper}
                                className="w-full py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold rounded-xl text-sm transition-all flex items-center justify-center gap-2 border border-slate-300 shadow-sm"
                            >
                                <span>🎲</span> 一鍵隨機變換題目
                            </button>

                            <button 
                                onClick={() => window.print()}
                                className={`w-full py-3 px-4 ${t.primary} font-bold rounded-xl text-sm transition-all shadow-md flex items-center justify-center gap-2`}
                            >
                                <span>🖨️</span> 列印正式試卷 (A4)
                            </button>
                            <p className="text-[10px] text-slate-400 text-center leading-relaxed">提示：列印時請在「更多設定」中勾選「背景圖形」，並將邊界設為「無」或「預設」，以獲得最佳排版效果。</p>
                        </div>
                    </div>

                    {/* 📄 Paper View Area */}
                    <div className="flex-1 p-4 md:p-12 overflow-y-auto print:p-0 flex justify-center bg-slate-100 print:bg-white">
                        <div className={`print-area w-full max-w-[21cm] bg-white shadow-xl rounded-2xl print:shadow-none print:rounded-none overflow-hidden ${fontSize} leading-loose font-serif`}>
                            
                            {/* COVER PAGE (Page 1) */}
                            <div className="exam-page p-12 md:p-16 flex flex-col justify-between border-b border-slate-200 min-h-[29.7cm] relative">
